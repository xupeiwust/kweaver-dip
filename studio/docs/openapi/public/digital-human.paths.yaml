openapi: 3.1.0

info:
  title: DIP Studio 公开接口
  version: 0.1.0

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

security:
  - BearerAuth: []

servers:
  - url: /api/dip-studio/v1
  
paths:
  /digital-human/built-in:
    get:
      operationId: getBuiltInDigitalHumanList
      summary: 获取预置数字员工模板列表
      responses:
        "200":
          description: 预置数字员工模板列表
          content:
            application/json:
              schema:
                $ref: './digital-human.schemas.yaml#/components/schemas/BuiltInDigitalHumanList'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
  /digital-human/built-in/{ids}:
    put:
      operationId: createBuiltInDigitalHuman
      summary: 根据模板 ID 创建或更新预置数字员工
      parameters:
        - name: ids
          in: path
          required: true
          description: 预置数字员工模板 ID，多个值使用英文逗号分隔
          schema:
            type: string
      responses:
        "201":
          description: 创建或更新成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './digital-human.schemas.yaml#/components/schemas/CreateDigitalHumanResponse'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'

  /digital-human:
    get:
      operationId: getDigitalHumanList
      summary: 获取数字员工列表
      responses:
        "200":
          description: 数字员工列表
          content:
            application/json:
              schema:
                $ref: './digital-human.schemas.yaml#/components/schemas/DigitalHumanList'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "409":
          $ref: '../common.schemas.yaml#/errors/Conflict'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
    post:
      operationId: createDigitalHuman
      summary: 创建数字员工
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './digital-human.schemas.yaml#/components/schemas/CreateDigitalHumanRequest'
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: './digital-human.schemas.yaml#/components/schemas/CreateDigitalHumanResponse'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "409":
          $ref: '../common.schemas.yaml#/errors/Conflict'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'

  /digital-human/{id}:
    get:
      operationId: getDigitalHumanDetail
      summary: 获取单个数字员工详情
      parameters:
        - name: id
          in: path
          required: true
          description: 数字员工 ID（与 OpenClaw agent id 一致）
          schema:
            type: string
      responses:
        "200":
          description: 详情
          content:
            application/json:
              schema:
                $ref: './digital-human.schemas.yaml#/components/schemas/DigitalHumanDetail'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
    put:
      operationId: updateDigitalHuman
      summary: 更新数字员工（部分字段）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './digital-human.schemas.yaml#/components/schemas/UpdateDigitalHumanRequest'
      responses:
        "200":
          description: 更新后的数字员工
          content:
            application/json:
              schema:
                $ref: './digital-human.schemas.yaml#/components/schemas/UpdateDigitalHumanResponse'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
    delete:
      operationId: deleteDigitalHuman
      summary: 删除数字员工及其计划任务，默认保留历史会话
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deleteFiles
          in: query
          required: false
          description: 是否删除工作区文件（默认 false，用于保留历史会话）；传 true 时同时删除工作区文件。删除数字员工时会一并删除其所有计划任务。
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "204":
          description: 删除成功，无响应体。关联的计划任务会被一并删除；未显式传 deleteFiles=true 时会保留工作区文件和历史会话。
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
  /digital-human/{id}/channel-users:
    get:
      operationId: getDigitalHumanChannelUsers
      summary: 获取指定数字员工可 @ 的通道用户列表
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            $ref: './channel-users.schemas.yaml#/components/schemas/ChannelUserType'
        - name: displayName
          in: query
          description: 按显示名做不区分大小写的部分匹配过滤
          schema:
            type: string
      responses:
        "200":
          description: 通道用户列表
          content:
            application/json:
              schema:
                $ref: './channel-users.schemas.yaml#/components/schemas/ChannelUserListResponse'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
    put:
      operationId: updateDigitalHumanChannelUsers
      summary: 更新数字员工消息投递范围
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './digital-human.schemas.yaml#/components/schemas/UpdateDigitalHumanChannelUsersRequest'
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: './digital-human.schemas.yaml#/components/schemas/DigitalHumanChannelUsersResponse'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
