openapi: 3.1.0

info:
  title: DIP Studio 用户偏好接口
  version: 0.1.0

security: []

servers:
  - url: /api/dip-studio/v1

paths:
  /user/preferences:
    get:
      operationId: getUserPreferences
      summary: 获取当前用户偏好
      description: 读取当前登录用户在 Studio 场景下持久化的侧栏 pinned 数字员工列表。
      responses:
        "200":
          description: 当前用户偏好快照
          content:
            application/json:
              schema:
                $ref: './user-preference.schemas.yaml#/components/schemas/UserPreferences'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "409":
          $ref: '../common.schemas.yaml#/errors/Conflict'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'

    put:
      operationId: putUserPreferences
      summary: 更新当前用户偏好
      description: |
        全量替换当前登录用户的 pinned 数字员工 ID 列表。
        服务端会按首次出现顺序去重、trim 空白字符串，并限制最多 8 个 ID。
        持久化时仅覆盖 `pinned_digital_human_ids` 字段，不清空同一 JSON 文档中的其它偏好键。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './user-preference.schemas.yaml#/components/schemas/PutUserPreferencesRequest'
      responses:
        "200":
          description: 更新后的当前用户偏好快照
          content:
            application/json:
              schema:
                $ref: './user-preference.schemas.yaml#/components/schemas/UserPreferences'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "409":
          $ref: '../common.schemas.yaml#/errors/Conflict'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
