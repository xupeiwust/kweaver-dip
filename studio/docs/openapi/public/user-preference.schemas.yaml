components:
  schemas:
    UserPreferences:
      type: object
      description: 当前登录用户在 Studio 场景下的侧栏固定数字员工偏好。
      properties:
        pinned_digital_human_ids:
          type: array
          description: 侧栏固定的数字员工 ID 列表，顺序即展示顺序。
          maxItems: 8
          items:
            type: string
            maxLength: 128
      required:
        - pinned_digital_human_ids

    PutUserPreferencesRequest:
      type: object
      description: 全量替换当前用户的 pinned 数字员工列表。
      properties:
        pinned_digital_human_ids:
          type: array
          description: 侧栏固定的数字员工 ID 列表，顺序即展示顺序。
          maxItems: 8
          items:
            type: string
            maxLength: 128
      required:
        - pinned_digital_human_ids
